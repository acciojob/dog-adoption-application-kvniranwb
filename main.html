<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>
<form>

    <!-- Name -->
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Name">
    <br><br>

    <!-- Phone Number -->
    <label for="phone">Phone Number:</label>
    <input type="text" id="phone" name="phone" placeholder="Phone Number">
    <br><br>

    <!-- Address -->
    <label for="address">Address:</label>
    <input type="text" id="address" name="address" placeholder="Address">
    <br><br>

    <!-- Checkbox -->
    <input type="checkbox" id="checkbox" name="checkbox" value="Have you ever lived with a Dog before?">
    <label for="checkbox">Have you ever lived with a Dog before?</label>
    <br><br>

    <!-- Multi-select -->
    <label for="multiSelect">Please select your preferred breeds:</label>
    <select id="multiSelect" name="multiSelect" multiple>
        <option value="labrador">Labrador</option>
        <option value="german_shepherd">German Shepherd</option>
        <option value="golden_retriever">Golden Retriever</option>
        <option value="pug">Pug</option>
    </select>
    <br><br>

    <!-- Submit -->
    <input type="submit" id="submit" value="Submit">
</body>

</html>
